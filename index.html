<!DOCTYPE html>
<html>
<head>
<title>My Trade Journal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
background:#0b0f19;
color:white;
font-family:Arial;
padding:40px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
background:#2f80ed;
border:none;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:10px;
text-align:center;
}

th{
background:#111827;
}
</style>
</head>

<body>

<h1>My Trade Journal</h1>

<h3>Add Trade</h3>

<input id="asset" placeholder="Asset (BTCUSDT)">
<input id="entry" placeholder="Entry Price">
<input id="exit" placeholder="Exit Price">
<input id="size" placeholder="Position Size">

<button onclick="addTrade()">Add Trade</button>

<h2>Trades</h2>

<table>
<thead>
<tr>
<th>Asset</th>
<th>Entry</th>
<th>Exit</th>
<th>Size</th>
<th>Profit</th>
</tr>
</thead>

<tbody id="tradeTable"></tbody>
</table>

<script>

const supabase = supabase.createClient(
"YOUR_SUPABASE_URL",
"YOUR_SUPABASE_ANON_KEY"
);

async function addTrade(){

let asset=document.getElementById("asset").value
let entry=parseFloat(document.getElementById("entry").value)
let exit=parseFloat(document.getElementById("exit").value)
let size=parseFloat(document.getElementById("size").value)

let profit=(exit-entry)*size

await supabase.from("trades").insert([
{
актив:asset,
входна_цена:entry,
изходна_цена:exit,
размер_на_позицията:size
}
])

loadTrades()
}

async function loadTrades(){

const {data}=await supabase
.from("trades")
.select("*")

let table=document.getElementById("tradeTable")
table.innerHTML=""

data.forEach(trade=>{

let profit=(trade.изходна_цена-trade.входна_цена)*trade.размер_на_позицията

table.innerHTML+=`
<tr>
<td>${trade.актив}</td>
<td>${trade.входна_цена}</td>
<td>${trade.изходна_цена}</td>
<td>${trade.размер_на_позицията}</td>
<td>${profit.toFixed(2)}</td>
</tr>
`
})

}

loadTrades()

</script>

</body>
</html>
